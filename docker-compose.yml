version: '3.8'

networks:
  restaurant-net:
    driver: bridge

services:

  # ─── Infrastructure ───────────────────────────────────────────────────────────

  rabbitmq:
    image: rabbitmq:3-management
    container_name: rabbitmq
    networks:
      - restaurant-net
    environment:
      RABBITMQ_DEFAULT_USER: admin
      RABBITMQ_DEFAULT_PASS: password
    ports:
      - "5672:5672"
      - "15672:15672"
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

  # ── Les 4 bases PostgreSQL ────────────────────────────────────────────────────

  client-db:
    image: postgres:16
    container_name: client-db
    networks:
      - restaurant-net
    environment:
      POSTGRES_DB: client_db
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
    volumes:
      - client-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user -d client_db"]
      interval: 5s
      timeout: 5s
      retries: 10

  order-db:
    image: postgres:16
    container_name: order-db
    networks:
      - restaurant-net
    environment:
      POSTGRES_DB: order_db
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
    volumes:
      - order-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user -d order_db"]
      interval: 5s
      timeout: 5s
      retries: 10

  kitchen-db:
    image: postgres:16
    container_name: kitchen-db
    networks:
      - restaurant-net
    environment:
      POSTGRES_DB: kitchen_db
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
    volumes:
      - kitchen-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user -d kitchen_db"]
      interval: 5s
      timeout: 5s
      retries: 10

  delivery-db:
    image: postgres:16
    container_name: delivery-db
    networks:
      - restaurant-net
    environment:
      POSTGRES_DB: delivery_db
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
    volumes:
      - delivery-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user -d delivery_db"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ── Adminer — attend que les 4 bases soient healthy ──────────────────────────

  adminer:
    image: adminer
    container_name: adminer
    networks:
      - restaurant-net
    ports:
      - "8080:8080"
    depends_on:
      client-db:
        condition: service_healthy
      order-db:
        condition: service_healthy
      kitchen-db:
        condition: service_healthy
      delivery-db:
        condition: service_healthy

  # ─── Microservices ────────────────────────────────────────────────────────────

  client-service:
    build: ./client-service
    container_name: client-service
    networks:
      - restaurant-net
    restart: on-failure
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://client-db:5432/client_db
      SPRING_DATASOURCE_USERNAME: user
      SPRING_DATASOURCE_PASSWORD: password
      SPRING_RABBITMQ_HOST: rabbitmq
      SPRING_RABBITMQ_USERNAME: admin
      SPRING_RABBITMQ_PASSWORD: password
      JWT_SECRET: ThisIsAVerySecretKeyForJWTSigningMin32Chars!
    ports:
      - "8081:8081"
    depends_on:
      client-db:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  order-service:
    build: ./order-service
    container_name: order-service
    networks:
      - restaurant-net
    restart: on-failure
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://order-db:5432/order_db
      SPRING_DATASOURCE_USERNAME: user
      SPRING_DATASOURCE_PASSWORD: password
      SPRING_RABBITMQ_HOST: rabbitmq
      SPRING_RABBITMQ_USERNAME: admin
      SPRING_RABBITMQ_PASSWORD: password
      JWT_SECRET: ThisIsAVerySecretKeyForJWTSigningMin32Chars!
    ports:
      - "8082:8082"
    depends_on:
      order-db:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  kitchen-service:
    build: ./kitchen-service
    container_name: kitchen-service
    networks:
      - restaurant-net
    restart: on-failure
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://kitchen-db:5432/kitchen_db
      SPRING_DATASOURCE_USERNAME: user
      SPRING_DATASOURCE_PASSWORD: password
      SPRING_RABBITMQ_HOST: rabbitmq
      SPRING_RABBITMQ_USERNAME: admin
      SPRING_RABBITMQ_PASSWORD: password
      JWT_SECRET: ThisIsAVerySecretKeyForJWTSigningMin32Chars!
    ports:
      - "8083:8083"
    depends_on:
      kitchen-db:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  delivery-service:
    build: ./delivery-service
    container_name: delivery-service
    networks:
      - restaurant-net
    restart: on-failure
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://delivery-db:5432/delivery_db
      SPRING_DATASOURCE_USERNAME: user
      SPRING_DATASOURCE_PASSWORD: password
      SPRING_RABBITMQ_HOST: rabbitmq
      SPRING_RABBITMQ_USERNAME: admin
      SPRING_RABBITMQ_PASSWORD: password
      JWT_SECRET: ThisIsAVerySecretKeyForJWTSigningMin32Chars!
    ports:
      - "8084:8084"
    depends_on:
      delivery-db:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  api-gateway:
    build: ./api-gateway
    container_name: api-gateway
    networks:
      - restaurant-net
    restart: on-failure
    environment:
      JWT_SECRET: ThisIsAVerySecretKeyForJWTSigningMin32Chars!
      CLIENT_SERVICE_URL: http://client-service:8081
      ORDER_SERVICE_URL: http://order-service:8082
      KITCHEN_SERVICE_URL: http://kitchen-service:8083
      DELIVERY_SERVICE_URL: http://delivery-service:8084
    ports:
      - "9000:9000"
    depends_on:
      - client-service
      - order-service
      - kitchen-service
      - delivery-service

  frontend:
    build: ./frontend
    container_name: frontend
    networks:
      - restaurant-net
    ports:
      - "3000:80"
    depends_on:
      - api-gateway

volumes:
  client-db-data:
  order-db-data:
  kitchen-db-data:
  delivery-db-data:
